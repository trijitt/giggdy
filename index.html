<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>For Rai ❤️</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Quicksand:wght@400;600&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: 'Quicksand', sans-serif;
  background: linear-gradient(135deg, #ffd6e0, #e7c6ff, #cdb4db);
  height: 100vh;
  overflow: hidden;
  text-align: center;
  color: #5a3d5c;
}

/* center content */
.center {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
}

/* floating hearts */
.heart {
  position: absolute;
  animation: float 6s linear infinite;
  opacity: 0.5;
}
@keyframes float {
  from { transform: translateY(100vh); }
  to { transform: translateY(-10vh); }
}

/* pages */
.page {
  display: none;
  width: 100%;
  height: 100%;
}
.active { display: block; }

/* text */
h1 {
  font-family: 'Pacifico', cursive;
  font-size: 30px;
  padding: 20px;
}

/* buttons */
button {
  border: none;
  padding: 14px 26px;
  margin: 10px;
  border-radius: 30px;
  background: #ff8fab;
  color: white;
  cursor: pointer;
  transition: 0.25s;
}

button:hover {
  transform: scale(1.08);
  background: #ff4d6d;
}

#noBtn {
  position: absolute;
}

/* bottom button */
.bottom-btn {
  position: absolute;
  bottom: 30px;
  right: 30px;
  background: #6a4c93;
}

/* big video */
.video-full {
  width: 75vw;
  height: 75vh;
  border-radius: 15px;
}
</style>
</head>

<body>

<!-- music -->
<audio id="bgMusic" loop>
  <source src="song.mp3" type="audio/mpeg">
</audio>

<!-- floating hearts -->
<script>
setInterval(() => {
  const heart = document.createElement("div");
  heart.className = "heart";
  heart.innerHTML = "❤️";
  heart.style.left = Math.random() * 100 + "vw";
  heart.style.fontSize = (Math.random() * 18 + 10) + "px";
  document.body.appendChild(heart);
  setTimeout(() => heart.remove(), 6000);
}, 400);
</script>

<!-- PAGE 1 -->
<div id="page1" class="page active">
  <div class="center">
    <h1>
      Will you be my forever love and let me love you and care for you and call you mine for the rest of eternity? 💖
    </h1>
    <button onclick="go('page2')">Yes 💘</button>
    <button id="noBtn" onclick="go('pageNo')">No 💔</button>
  </div>
</div>

<!-- PAGE 2 -->
<div id="page2" class="page">
  <div class="center">
    <h1>
      And that is why you are perfect, Rai 💕 because you chose me and let me choose you ✨
    </h1>
  </div>
  <button class="bottom-btn" onclick="go('page3')">
    I want to tell you something…
  </button>
</div>

<!-- PAGE 3 -->
<div id="page3" class="page">
  <div class="center">
    <iframe class="video-full"
      src="https://www.youtube.com/embed/2Vv-BfVoq4g"
      frameborder="0"
      allow="accelerometer; autoplay; encrypted-media"
      allowfullscreen>
    </iframe>
  </div>
</div>

<!-- NO PAGE -->
<div id="pageNo" class="page">
  <div class="center">
    <h1>
      again, since i am the biggest despo for you, please say yes? 🥺
    </h1>
    <button onclick="go('page1')">"sure"</button>
  </div>
</div>

<script>
// music start
document.addEventListener("click", () => {
  const m = document.getElementById("bgMusic");
  m.volume = 0.5;
  m.play().catch(()=>{});
}, { once: true });

// navigation
function go(p){
  // stop music on final page
  if(p === "page3"){
    document.getElementById("bgMusic").pause();
  }

  document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
  document.getElementById(p).classList.add("active");
  history.pushState({page:p},"","#"+p);
}

// browser nav
window.onpopstate = (e)=>{
  const p = e.state?.page || "page1";
  document.querySelectorAll(".page").forEach(el=>el.classList.remove("active"));
  document.getElementById(p).classList.add("active");
};

// ultra smooth NO button (full screen)
const noBtn = document.getElementById("noBtn");

let lastX=0,lastY=0;

document.addEventListener("mousemove",(e)=>{
  const speed = Math.hypot(e.clientX-lastX,e.clientY-lastY);
  lastX=e.clientX; lastY=e.clientY;

  const rect = noBtn.getBoundingClientRect();

  const dx = e.clientX - (rect.left + rect.width/2);
  const dy = e.clientY - (rect.top + rect.height/2);
  const dist = Math.hypot(dx,dy);

  const radius = 140;

  if(dist < radius){
    const angle = Math.atan2(dy,dx);

    // faster than cursor
    const force = Math.min(200, speed*2.5);

    let newX = rect.left - Math.cos(angle)*force;
    let newY = rect.top - Math.sin(angle)*force;

    // keep inside screen
    newX = Math.max(0, Math.min(window.innerWidth - rect.width, newX));
    newY = Math.max(0, Math.min(window.innerHeight - rect.height, newY));

    noBtn.style.left = newX + "px";
    noBtn.style.top = newY + "px";
  }
});
</script>

</body>
</html>
